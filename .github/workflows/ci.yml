name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: property-portal-template-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validate content and agent contracts
        run: npm run validate
      - name: Type check
        run: npm run typecheck
      - name: Audit dependencies
        run: npm run audit
      - name: Build
        if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
        run: npm run build
      - name: Smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
        run: npm run smoke
      - name: Auth boundary smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
        run: npm run auth:smoke
      - name: Notification lifecycle smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
        run: npm run notification:smoke
      - name: Weekly owner review smoke
        if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
        run: npm run weekly:smoke
